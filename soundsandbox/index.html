<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>SoundSandbox · R.I.S.E.</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050508;
            color: #e8e8ec;
            font-family: 'SF Mono', 'Cascadia Code', Consolas, monospace;
            min-height: 100vh;
            padding: 28px clamp(16px, 4vw, 56px);
        }
        header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 6px; }
        h1 { font-size: 17px; font-weight: 500; letter-spacing: 0.24em; }
        .sub { font-size: 11px; color: #6a6a78; letter-spacing: 0.08em; }

        #scope {
            width: 100%; height: 130px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px;
            margin: 18px 0;
        }

        .master {
            display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px;
            margin-bottom: 22px;
            background: rgba(255,255,255,0.015);
        }
        .master label { font-size: 10px; letter-spacing: 0.14em; color: #8a8a98; text-transform: uppercase; }
        .fade-wrap { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 260px; }
        .fade-tag { font-size: 12px; color: #aab; }
        input[type=range] { accent-color: #8cacff; flex: 1; min-width: 80px; }
        #master-vol { max-width: 130px; }

        button {
            background: transparent; color: #cfcfda;
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 7px; padding: 5px 12px;
            font: inherit; font-size: 11.5px; cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }
        button:hover { border-color: rgba(140,172,255,0.6); color: #fff; }
        #panic { border-color: rgba(255,130,130,0.35); color: #e6a5a5; }

        .rack { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 860px) { .rack { grid-template-columns: 1fr; } }

        .slot {
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 16px 18px;
            background: rgba(255,255,255,0.018);
        }
        .slot-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .slot-tag {
            font-size: 13px; font-weight: 600; color: #8cacff;
            border: 1px solid rgba(140,172,255,0.35);
            border-radius: 6px; padding: 2px 9px;
        }
        select {
            background: #0d0d14; color: #e8e8ec;
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 6px; padding: 4px 8px;
            font: inherit; font-size: 12px; flex: 1;
        }
        .play-btn { min-width: 74px; }
        .play-btn.playing { border-color: rgba(255,208,130,0.6); color: #ffd082; }
        .slot-desc { font-size: 11px; color: #7a7a88; line-height: 1.5; margin-bottom: 12px; }

        .params { display: flex; flex-direction: column; gap: 9px; }
        .param-row { display: grid; grid-template-columns: 108px 1fr 46px; gap: 10px; align-items: center; }
        .param-row label { font-size: 10.5px; color: #9a9aa8; letter-spacing: 0.04em; }
        .param-row select { grid-column: 2 / 4; }
        .readout { font-size: 10.5px; color: #8cacff; text-align: right; }
        .marks { grid-column: 2 / 4; display: flex; gap: 5px; flex-wrap: wrap; }
        .mark {
            font-size: 9.5px; padding: 1px 7px; border-radius: 10px;
            border-color: rgba(255,255,255,0.1); color: #8a8a98;
        }
        footer { margin-top: 26px; font-size: 10px; color: #55555f; line-height: 1.7; }
    </style>
</head>
<body>
    <header>
        <h1>SOUNDSANDBOX</h1>
        <span class="sub">modular synthesis bench · dev-only, never shipped</span>
    </header>

    <canvas id="scope"></canvas>

    <div class="master">
        <button id="solo-a">solo A</button>
        <div class="fade-wrap">
            <span class="fade-tag">A</span>
            <input type="range" id="crossfade" min="0" max="1" step="0.01" value="0.5">
            <span class="fade-tag">B</span>
        </div>
        <button id="solo-b">solo B</button>
        <button id="both">center</button>
        <label>master</label>
        <input type="range" id="master-vol" min="0" max="1" step="0.01" value="0.9">
        <button id="panic">■ all stop</button>
    </div>

    <div class="rack">
        <div class="slot" id="slot-A"></div>
        <div class="slot" id="slot-B"></div>
    </div>

    <footer>
        run: <b>npm run dev</b> → localhost:5173/soundsandbox/ &nbsp;·&nbsp;
        add a sound: create <b>patches/lab-*.js</b>, register in <b>patches/manifest.js</b> &nbsp;·&nbsp;
        contract &amp; craft rules: <b>AGENTS.md</b> &nbsp;·&nbsp;
        chain: patch → slot → crossfade → master → limiter → out
    </footer>

    <script type="module" src="./harness.js"></script>
</body>
</html>
