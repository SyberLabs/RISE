# Netlify Configuration for R.I.S.E.
# Recursive Installation of Symbolic Experience

[build]
  # Build command
  command = "npm run build"

  # Output directory (Vite default)
  publish = "dist"

# SPA routing - redirect all requests to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # CSP: self-hosted scripts only; APIs limited to the content providers the app
    # actually calls (Gutenberg, arXiv, Wikimedia Commons, Met, Art Institute, corsproxy).
    # img-src allows any https CDN because museum APIs return varied image hosts.
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob:; worker-src 'self' blob:; connect-src 'self' https://www.gutenberg.org https://corsproxy.io https://export.arxiv.org https://commons.wikimedia.org https://api.artic.edu https://www.artic.edu https://collectionapi.metmuseum.org https://openaccess-api.clevelandart.org https://id.rijksmuseum.nl; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"

# The shell must never be cached: it names the hashed chunks, so a
# stale index.html sends a browser after files the current deploy has
# replaced. That is what strands a tab left open across a release — it
# asks for Portal-<old hash>.js, gets a 404, and can no longer reach
# any view it had not already loaded. (The router now detects this and
# reloads once to recover; this header keeps the recovery from looping.)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache static assets aggressively — safe because they are content-hashed
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache fonts
[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
